version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dsms-postgres
    environment:
      POSTGRES_USER: dsms_user
      POSTGRES_PASSWORD: dsms_password
      POSTGRES_DB: dsms_platform
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dsms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
