spring:
  application:
    name: dsms-backend
  datasource:
    url: jdbc:postgresql://localhost:5433/dsms_platform
    username: dsms_user
    password: dsms_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: platform
        # Multi-tenancy configurations will go here later
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    default-schema: platform
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: YmFzZTY0LWVuY29kZWQtc2VjcmV0LWtleS1mb3ItZHNtcy1hcGktc2VjdXJpdHktdGhhdC1pcy1hdC1sZWFzdC0yNTYtYml0cy1sb25n
  expiration: 900000 # 15 minutes in ms
  refresh-expiration: 604800000 # 7 days in ms

server:
  port: 8080
